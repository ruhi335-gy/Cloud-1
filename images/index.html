<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Cloud</title>
<link rel="icon" href="logo.png" type="image/png">
<link rel="manifest" href="manifest.json">

</head>
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
 </script>
 
 <style>
   
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

:root {
    --primary: #22c55e;
    --bg-dark: #0f172a;
    --text-main: #f8fafc;
    --border-color: #334155;
}

body {
    font-family: 'Inter', sans-serif;
    background: radial-gradient(circle at top right, #1e293b, #0f172a);
    color: var(--text-main);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
}

.card {
    background: rgba(30, 41, 59, 0.7);
    padding: 30px;
    border-radius: 24px;
    width: 380px;
    text-align: center;
}

h2 {
    margin-bottom: 20px;
}

.upload-box {
    border: 2px dashed var(--border-color);
    padding: 30px;
    border-radius: 15px;
    cursor: pointer;
    margin-bottom: 15px;
}

.options {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin: 15px 0;
}

.opt {
    padding: 12px;
    border-radius: 12px;
    background: #1e293b;
    border: 1px solid var(--border-color);
    cursor: pointer;
    text-align: center;
}

.opt span {
    display: block;
    font-size: 11px;
}

.opt.active {
    border-color: var(--primary);
    color: var(--primary);
}

button {
    width: 100%;
    padding: 14px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg, #22c55e, #10b981);
    color: white;
    margin-top: 10px;
    cursor: pointer;
}

.progress {
    height: 8px;
    background: #0f172a;
    margin-top: 15px;
    border-radius: 10px;
}

.bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #22c55e, #4ade80);
    transition: width 0.3s ease; /* 👈 important */
}

#status {
    margin-top: 10px;
    font-size: 12px;
    color: #94a3b8;
    white-space: pre-line;
}
 </style>

<body>

<div class="card">

<h2>I Cloud</h2>

<!-- Upload -->
<div class="upload-box" onclick="pickFile()">📤 Upload File</div>
<input type="file" id="fileInput" multiple hidden>

<!-- Repo -->
<p>select storeg type</p>
<div class="options" id="repoOptions">
    <div class="opt active" onclick="selectRepo(this,'Cloud-1')">☁️ <span>Cloud-1</span></div>
    <div class="opt" onclick="selectRepo(this,'My-meadiya')">📦 <span>My-meadiya</span></div>
</div>

<!-- Folder -->
<p>select file type</p>
<div class="options folder-group" data-repo="Cloud-1">
    <div class="opt active" onclick="selectFolder(this,'songs')">🎧 <span>Songs</span></div>
    <div class="opt" onclick="selectFolder(this,'images')">🖼️ <span>Images</span></div>
    <div class="opt" onclick="selectFolder(this,'videos')">🎥 <span>Videos</span></div>
    <div class="opt" onclick="selectFolder(this,'documents')">📁<span>documents</span></div>
    <div class="opt" onclick="selectFolder(this,'pdf')">🗂️ <span>pdf</span></div>
    <div class="opt" onclick="selectFolder(this,'apk')">📥<span>apk</spa
    ></div>
    <div class="opt" onclick="selectFolder(this,'zip')">️💾 <span>zip</span></div>
    
</div>


<div class="options folder-group" data-repo="My-meadiya" style="display:none;">
    <div class="opt active" onclick="selectFolder(this,'eng-img')">🖼️ <span>eng-img</span></div>
    <div class="opt" onclick="selectFolder(this,'eng-song')">🎧  <span>eng-song</span></div>
    <div class="opt" onclick="selectFolder(this,'hind-img')">🖼️ <span>hind-img</span></div>
    <div class="opt" onclick="selectFolder(this,'hind-song')">🎧 
    <span>hind-song</span></div>
    <div class="opt" onclick="selectFolder(this,'My-files')">📁<span>My-files</span></div>
    
</div>

<!-- Button -->
<button onclick="uploadFile()">🚀 Upload</button>

<!-- Progress -->
<div class="progress">
    <div class="bar" id="bar"></div>
</div>

<!-- Status -->
<div id="status"></div>

</div>

<script>
  const TOKEN = "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";
const USERNAME = "ruhi335-gy";

let REPO = "Cloud-1";
let selectedFolder = "songs";
let selectedFiles = [];

const fileInput = document.getElementById("fileInput");
const bar = document.getElementById("bar");
const statusText = document.getElementById("status");

// Repo select
function selectRepo(el, repo) {
    document.querySelectorAll("#repoOptions .opt").forEach(o => o.classList.remove("active"));
    el.classList.add("active");

    REPO = repo;

    document.querySelectorAll(".folder-group").forEach(g => g.style.display = "none");

    const active = document.querySelector(`.folder-group[data-repo="${repo}"]`);
    active.style.display = "grid";

    active.querySelectorAll(".opt").forEach(o => o.classList.remove("active"));
    const first = active.querySelector(".opt");
    first.classList.add("active");

    selectedFolder = first.getAttribute("onclick").match(/'(.+?)'/)[1];
}

// Folder select
function selectFolder(el, folder) {
    const parent = el.parentElement;
    parent.querySelectorAll(".opt").forEach(o => o.classList.remove("active"));
    el.classList.add("active");

    selectedFolder = folder;
}

// Pick file
function pickFile() {
    fileInput.click();
}

// File select validation
fileInput.addEventListener("change", function(e) {

    bar.style.width = "0%";
    selectedFiles = Array.from(e.target.files);

    if (selectedFiles.length > 5) {
        alert("❌ Max 5 files allowed");
        fileInput.value = "";
        selectedFiles = [];
        return;
    }

    let totalSize = 0;
    selectedFiles.forEach(f => totalSize += f.size);

    let totalMB = (totalSize / (1024 * 1024)).toFixed(2);

    if (totalMB > 100) {
        alert("❌ Total size must be under 100MB");
        fileInput.value = "";
        selectedFiles = [];
        return;
    }

    statusText.innerText = `📦 ${selectedFiles.length} file | ${totalMB} MB selected`;
});

// Upload
function uploadFile() {
    if (selectedFiles.length === 0) {
        alert("Select file first");
        return;
    }

    if (!TOKEN) {
        alert("GitHub Token missing!");
        return;
    }

    selectedFiles.forEach((file, index) => uploadSingleFile(file, index));
}

function uploadSingleFile(file, index) {
    const reader = new FileReader();

    reader.onload = function () {
        const base64 = reader.result.split(",")[1];

        const xhr = new XMLHttpRequest();
        const url = `https://api.github.com/repos/${USERNAME}/${REPO}/contents/${selectedFolder}/${file.name}`;

        xhr.open("PUT", url, true);
        xhr.setRequestHeader("Authorization", "token " + TOKEN);

        xhr.upload.onprogress = function (e) {
            if (e.lengthComputable) {
                let percent = (e.loaded / e.total) * 100;

                let uploadedMB = (e.loaded / (1024 * 1024)).toFixed(2);
                let totalMB = (e.total / (1024 * 1024)).toFixed(2);

                bar.style.width = percent + "%";

                statusText.innerText =
                    `⬆️ ${file.name}\n${uploadedMB}MB / ${totalMB}MB (${Math.round(percent)}%)`;
            }
        };

        xhr.onload = function () {
    if (xhr.status === 201) {

        bar.style.width = "100%"; // 👈 force full green

        statusText.innerText = `✅ Uploaded: ${file.name}`;

        setTimeout(() => {
            bar.style.width = "0%";
        }, 1500);

    } else {
        statusText.innerText = "❌ Upload failed";
    }
};

        xhr.send(JSON.stringify({
            message: "upload file",
            content: base64
        }));
    };

    reader.readAsDataURL(file);
}
</script>

</body>
</html>
