<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Cloud</title>
<link rel="stylesheet" href="Style.css"/>

</head>
<body>

<div class="card">

<h2>I Cloud</h2>

<!-- Upload -->
<div class="upload-box" onclick="pickFile()">📤 Upload File</div>
<input type="file" id="fileInput" multiple hidden>

<!-- Repo -->
<p>select storeg type</p>
<div class="options" id="repoOptions">
    <div class="opt active" onclick="selectRepo(this,'Cloud-1')">☁️ <span>Cloud-1</span></div>
    <div class="opt" onclick="selectRepo(this,'My-meadiya')">📦 <span>My-meadiya</span></div>
</div>

<!-- Folder -->
<p>select file type</p>
<div class="options folder-group" data-repo="Cloud-1">
    <div class="opt active" onclick="selectFolder(this,'songs')">🎧 <span>Songs</span></div>
    <div class="opt" onclick="selectFolder(this,'images')">🖼️ <span>Images</span></div>
    <div class="opt" onclick="selectFolder(this,'videos')">🎥 <span>Videos</span></div>
    <div class="opt" onclick="selectFolder(this,'documents')">📁<span>documents</span></div>
    <div class="opt" onclick="selectFolder(this,'pdf')">🗂️ <span>pdf</span></div>
    <div class="opt" onclick="selectFolder(this,'apk')">📥<span>apk</spa
    ></div>
    <div class="opt" onclick="selectFolder(this,'zip')">️💾 <span>zip</span></div>
    
</div>


<div class="options folder-group" data-repo="My-meadiya" style="display:none;">
    <div class="opt active" onclick="selectFolder(this,'eng-img')">🖼️ <span>eng-img</span></div>
    <div class="opt" onclick="selectFolder(this,'eng-song')">🎧  <span>eng-song</span></div>
    <div class="opt" onclick="selectFolder(this,'hind-img')">🖼️ <span>hind-img</span></div>
    <div class="opt" onclick="selectFolder(this,'hind-song')">🎧 
    <span>hind-song</span></div>
    <div class="opt" onclick="selectFolder(this,'My-files')">📁<span>My-files</span></div>
    
</div>

<!-- Button -->
<button onclick="uploadFile()">🚀 Upload</button>

<!-- Progress -->
<div class="progress">
    <div class="bar" id="bar"></div>
</div>

<!-- Status -->
<div id="status"></div>

</div>

<script src="Script.js"></script>

</body>
</html>
