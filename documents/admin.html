<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin - Cadbury Management</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #6A1B9A; --accent: #FFD700; --bg: #f0f2f5; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: #333; }

        /* Login Overlay */
        #loginOverlay {
            position: fixed; inset: 0; background: var(--primary); 
            display: flex; align-items: center; justify-content: center; z-index: 9999;
        }
        .login-card { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 350px; text-align: center; }
        .login-card input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        
        /* Layout */
        .header { background: var(--primary); color: white; padding: 15px; position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; }
        
        .tab-bar { 
            display: flex; background: white; position: sticky; top: 55px; z-index: 100;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); overflow-x: auto;
        }
        .tab-item { flex: 1; padding: 15px; text-align: center; font-size: 13px; font-weight: 600; color: #666; cursor: pointer; border-bottom: 3px solid transparent; white-space: nowrap; }
        .tab-item.active { color: var(--primary); border-bottom-color: var(--primary); }

        .content { padding: 15px; padding-bottom: 80px; }
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        
        /* Stats */
        .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-box { background: white; padding: 15px; border-radius: 12px; text-align: center; border-left: 4px solid var(--primary); }
        .stat-box h4 { font-size: 12px; color: #777; }
        .stat-box p { font-size: 18px; font-weight: bold; color: var(--primary); }

        /* Request Items */
        .req-item { border-bottom: 1px solid #eee; padding: 12px 0; }
        .req-item:last-child { border: none; }
        .req-info { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .req-details b { color: var(--primary); font-size: 14px; }
        .req-details p { font-size: 12px; color: #666; }
        .req-actions { display: flex; gap: 8px; }
        
        .btn { padding: 8px 15px; border: none; border-radius: 6px; font-size: 12px; font-weight: bold; color: white; cursor: pointer; flex: 1; }
        .btn-ok { background: #4CAF50; }
        .btn-no { background: #f44336; }
        
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="loginOverlay">
        <div class="login-card">
            <i class="fas fa-user-shield fa-3x" style="color: var(--primary); margin-bottom: 15px;"></i>
            <h3>Admin Login</h3>
            <input type="text" id="adminID" placeholder="Admin ID">
            <input type="password" id="adminPass" placeholder="Password">
            <button class="btn btn-ok" onclick="checkLogin()" style="width: 100%; padding: 12px; margin-top: 10px;">Login</button>
            <p id="loginError" style="color: red; font-size: 12px; margin-top: 10px; display: none;">Invalid ID or Password!</p>
        </div>
    </div>

    <div id="adminPanel" class="hidden">
        <div class="header">
            <b>Cadbury Admin</b>
            <span onclick="location.reload()" style="font-size: 12px;"><i class="fas fa-sign-out-alt"></i> Logout</span>
        </div>

        <div class="tab-bar">
            <div class="tab-item active" onclick="switchTab('dash', this)">Overview</div>
            <div class="tab-item" onclick="switchTab('rech', this)">Recharge (<span id="count-rech">0</span>)</div>
            <div class="tab-item" onclick="switchTab('with', this)">Withdraw (<span id="count-with">0</span>)</div>
        </div>

        <div class="content">
            <div id="tab-dash">
                <div class="stats-row">
                    <div class="stat-box"><h4>Total Users</h4><p id="stat-users">0</p></div>
                    <div class="stat-box"><h4>Pending Rech</h4><p id="sum-rech">0</p></div>
                </div>
            </div>

            <div id="tab-rech" class="hidden">
                <div class="card">
                    <h4>Recharge Requests</h4>
                    <div id="list-recharge"></div>
                </div>
            </div>

            <div id="tab-with" class="hidden">
                <div class="card">
                    <h4>Withdraw Requests</h4>
                    <div id="list-withdraw"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDGuHRu1FDMkFbebHKIqjajxKtwxCkxbxI",
  authDomain: "song-img.firebaseapp.com",
  databaseURL: "https://song-img-default-rtdb.firebaseio.com",
  projectId: "song-img",
  storageBucket: "song-img.firebasestorage.app",
  messagingSenderId: "118538141856",
  appId: "1:118538141856:web:a19e3d545d0a8ac87d49c5",
  measurementId: "G-LMBT7HVHKY"
};


        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- Fake Login Config ---
        const FAKE_ID = "kajal";
        const FAKE_PASS = "kajal";

        window.checkLogin = () => {
            const id = document.getElementById('adminID').value;
            const pass = document.getElementById('adminPass').value;
            if(id === FAKE_ID && pass === FAKE_PASS) {
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('adminPanel').classList.remove('hidden');
                initAdmin();
            } else {
                document.getElementById('loginError').style.display = 'block';
            }
        };

        window.switchTab = (id, el) => {
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('tab-dash').classList.add('hidden');
            document.getElementById('tab-rech').classList.add('hidden');
            document.getElementById('tab-with').classList.add('hidden');
            document.getElementById('tab-' + id).classList.remove('hidden');
        };

        function initAdmin() {
            // Stats & User Count
            onValue(ref(db, 'users'), (snap) => {
                document.getElementById('stat-users').innerText = snap.exists() ? Object.keys(snap.val()).length : 0;
            });

            // Recharge Logic
            onValue(ref(db, 'rechargeRequests'), (snap) => {
                const list = document.getElementById('list-recharge');
                list.innerHTML = "";
                let count = 0;
                snap.forEach(userNode => {
                    userNode.forEach(reqNode => {
                        const r = reqNode.val();
                        if(r.status === 'Pending') {
                            count++;
                            list.innerHTML += `
                            <div class="req-item">
                                <div class="req-info">
                                    <div class="req-details">
                                        <b>₹${r.amount}</b><p>${userNode.key}</p>
                                        <small>UTR: ${r.utr}</small>
                                    </div>
                                    <div class="req-actions">
                                        <button class="btn btn-ok" onclick="approveRecharge('${userNode.key}', '${reqNode.key}', ${r.amount})">Approve</button>
                                        <button class="btn btn-no" onclick="rejectReq('rechargeRequests','${userNode.key}','${reqNode.key}')">X</button>
                                    </div>
                                </div>
                            </div>`;
                        }
                    });
                });
                document.getElementById('count-rech').innerText = count;
                document.getElementById('sum-rech').innerText = count;
            });

            // Withdraw Logic
            onValue(ref(db, 'withdrawRequests'), (snap) => {
                const list = document.getElementById('list-withdraw');
                list.innerHTML = "";
                let count = 0;
                snap.forEach(userNode => {
                    userNode.forEach(reqNode => {
                        const r = reqNode.val();
                        if(r.status === 'Pending') {
                            count++;
                            list.innerHTML += `
                            <div class="req-item">
                                <div class="req-info">
                                    <div class="req-details">
                                        <b>₹${r.amount}</b><p>${userNode.key}</p>
                                        <small>UPI: ${r.upi}</small>
                                    </div>
                                    <div class="req-actions">
                                        <button class="btn btn-ok" onclick="markPaid('${userNode.key}', '${reqNode.key}')">Paid</button>
                                        <button class="btn btn-no" onclick="rejectReq('withdrawRequests','${userNode.key}','${reqNode.key}')">X</button>
                                    </div>
                                </div>
                            </div>`;
                        }
                    });
                });
                document.getElementById('count-with').innerText = count;
            });
        }

        window.approveRecharge = async (phone, reqId, amt) => {
            const userRef = ref(db, 'users/' + phone);
            const snap = await get(userRef);
            if(snap.exists()) {
                const newBal = (Number(snap.val().balance) || 0) + Number(amt);
                await update(userRef, { balance: newBal });
                await update(ref(db, `rechargeRequests/${phone}/${reqId}`), { status: 'Success' });
                alert("Approved!");
            }
        };

        window.markPaid = async (phone, reqId) => {
            await update(ref(db, `withdrawRequests/${phone}/${reqId}`), { status: 'Success' });
            alert("Paid!");
        };

        window.rejectReq = async (path, phone, reqId) => {
            if(confirm("Reject this?")) {
                await update(ref(db, `${path}/${phone}/${reqId}`), { status: 'Rejected' });
            }
        };
    </script>
</body>
</html>
